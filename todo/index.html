<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schedule</title>
<style>
  :root {
    --bg: #fafafa;
    --sidebar-bg: #f3f1ee;
    --panel: #ffffff;
    --border: #e5e1db;
    --text: #2b2b2b;
    --text-dim: #7a756d;
    --accent: #d1453b;
    --accent-dim: #f6e0de;
    --today: #058527;
    --overdue: #d1453b;
    --hover: #eeece7;
    --radius: 8px;
    --p-high: #d1453b;
    --p-medium: #eb8909;
    --p-low: #4573d1;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #202020;
      --sidebar-bg: #191919;
      --panel: #262626;
      --border: #383838;
      --text: #e8e6e3;
      --text-dim: #9a958c;
      --accent: #e8564c;
      --accent-dim: #3a2321;
      --today: #35c15a;
      --overdue: #e8564c;
      --hover: #2f2f2f;
      --p-high: #e8564c;
      --p-medium: #f0a13a;
      --p-low: #6c93e8;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, "Apple SD Gothic Neo", sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 14px;
  }
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  #sidebar {
    width: 250px; flex-shrink: 0; background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 16px 10px;
    overflow-y: auto;
  }
  .sidebar-title { font-weight: 700; font-size: 16px; padding: 4px 10px 16px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: var(--radius); cursor: pointer;
    color: var(--text); font-size: 13.5px;
  }
  .nav-item:hover { background: var(--hover); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }
  .nav-item .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .nav-item .count { margin-left: auto; color: var(--text-dim); font-size: 12px; }
  .sidebar-section {
    margin-top: 22px; padding: 0 10px 6px; display: flex; align-items: center;
    justify-content: space-between; color: var(--text-dim); font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .sidebar-section button {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    font-size: 15px; line-height: 1; padding: 2px 4px; border-radius: 4px;
  }
  .sidebar-section button:hover { background: var(--hover); color: var(--text); }
  .project-item { position: relative; }
  .project-item .del-btn {
    display: none; position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 13px;
    padding: 2px 6px; border-radius: 4px;
  }
  .project-item:hover .del-btn { display: block; }
  .project-item .del-btn:hover { background: var(--border); color: var(--accent); }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 28px; border-bottom: 1px solid var(--border);
  }
  #header h1 { font-size: 18px; margin: 0; flex: 1; }
  .view-toggle { display: flex; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .view-toggle button {
    border: none; background: none; padding: 7px 14px; cursor: pointer; color: var(--text-dim); font-size: 13px; font-weight: 600;
  }
  .view-toggle button.active { background: var(--accent); color: #fff; }
  .btn-primary {
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    padding: 8px 16px; font-size: 13.5px; font-weight: 600; cursor: pointer;
  }
  .btn-primary:hover { opacity: .9; }
  #sortSelect {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 7px 10px; font-size: 13px; color: var(--text); cursor: pointer;
  }
  #body { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  #content { flex: 1; overflow-y: auto; padding: 20px 28px 60px; }

  /* Quarter todo panel */
  #quarterPanel {
    width: 260px; flex-shrink: 0; border-left: 1px solid var(--border);
    background: var(--sidebar-bg); padding: 16px; overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .qp-header { font-weight: 700; font-size: 14px; margin-bottom: 12px; }
  .qp-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .qp-check {
    width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--p-low);
    flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    background: transparent;
  }
  .qp-check.checked { background: var(--text-dim); border-color: var(--text-dim); }
  .qp-check.checked::after { content: "✓"; color: #fff; font-size: 10px; }
  .qp-text { flex: 1; font-size: 13px; word-break: break-word; }
  .qp-item.done .qp-text { text-decoration: line-through; color: var(--text-dim); }
  .qp-del { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 12px; padding: 2px 4px; }
  .qp-del:hover { color: var(--accent); }
  .qp-add-row { display: flex; gap: 6px; margin-top: 10px; }
  .qp-add-row input {
    flex: 1; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 12.5px;
  }
  .qp-add-row button {
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 6px 10px; cursor: pointer; font-size: 13px;
  }

  /* Task list */
  .task-group-title { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; margin: 22px 0 8px; }
  .task-group-title:first-child { margin-top: 0; }
  .task-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 8px; border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .task-row:hover { background: var(--hover); border-radius: var(--radius); }
  .checkbox {
    width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--p-low);
    flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    background: transparent;
  }
  .checkbox.high { border-color: var(--p-high); }
  .checkbox.medium { border-color: var(--p-medium); }
  .checkbox.low { border-color: var(--p-low); }
  .checkbox.checked { background: var(--text-dim); border-color: var(--text-dim); }
  .checkbox.checked::after { content: "✓"; color: #fff; font-size: 11px; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 14px; }
  .task-row.completed .task-title { text-decoration: line-through; color: var(--text-dim); }
  .task-notes {
    font-size: 12.5px; color: var(--text-dim); margin-top: 3px; white-space: pre-wrap;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 10; line-clamp: 10; -webkit-box-orient: vertical;
  }
  .task-meta { display: flex; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
  .badge { font-size: 11.5px; padding: 2px 7px; border-radius: 5px; display: inline-flex; align-items: center; gap: 4px; }
  .badge.due { background: var(--hover); color: var(--text-dim); }
  .badge.due.today { color: var(--today); background: color-mix(in srgb, var(--today) 15%, transparent); }
  .badge.due.overdue { color: var(--overdue); background: color-mix(in srgb, var(--overdue) 15%, transparent); }
  .badge.project { background: var(--hover); color: var(--text-dim); }
  .badge .pdot { width: 7px; height: 7px; border-radius: 50%; }
  .badge.tag { background: var(--accent-dim); color: var(--accent); }
  .badge.meeting { background: var(--hover); color: var(--text-dim); }
  .empty-state { color: var(--text-dim); text-align: center; padding: 60px 20px; font-size: 14px; }
  .task-actions { display: flex; gap: 4px; opacity: 0; }
  .task-row:hover .task-actions { opacity: 1; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--text-dim); font-size: 14px; padding: 4px 6px; border-radius: 4px; }
  .icon-btn:hover { background: var(--border); color: var(--text); }

  /* Week view */
  #weekNav { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  #weekNav button { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; cursor: pointer; color: var(--text); }
  #weekNav button:hover { background: var(--hover); }
  #weekLabel { font-weight: 600; font-size: 14px; }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .day-col { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); min-height: 300px; display: flex; flex-direction: column; }
  .day-col-header { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); }
  .day-col-header .dname { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
  .day-col-header .dnum { font-size: 16px; font-weight: 700; margin-top: 2px; }
  .day-col.is-today .dnum { color: #fff; background: var(--accent); border-radius: 50%; width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; }
  .day-tasks { padding: 8px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .day-task {
    background: var(--hover); border-radius: 6px; padding: 6px 8px; font-size: 12.5px; cursor: pointer;
    border-left: 3px solid var(--p-low);
  }
  .day-task.high { border-left-color: var(--p-high); }
  .day-task.medium { border-left-color: var(--p-medium); }
  .day-task.low { border-left-color: var(--p-low); }
  .day-task.completed { text-decoration: line-through; opacity: .5; }
  .day-task .dt-time { color: var(--text-dim); font-size: 11px; margin-top: 2px; }
  .day-task .dt-meeting { color: var(--text-dim); font-size: 11px; margin-top: 2px; }

  /* Modal */
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; z-index: 100; }
  #overlay.show { display: flex; }
  #modal { background: var(--panel); border-radius: 10px; width: 760px; max-width: 95vw; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,.25); }
  #modal h2 { margin: 0 0 14px; font-size: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 13.5px; font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 50px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .modal-body-grid { display: flex; gap: 24px; }
  .modal-col-left { flex: 1; min-width: 0; }
  .modal-col-right { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .modal-col-right label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; font-weight: 600; }
  .notes-textarea { flex: 1; min-height: 220px; font-size: 13.5px; line-height: 1.5; }
  @media (max-width: 640px) {
    .modal-body-grid { flex-direction: column; }
    .notes-textarea { min-height: 120px; }
  }
  .modal-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
  .btn-secondary {
    background: none; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 8px 14px; cursor: pointer; color: var(--text); font-size: 13px; font-weight: 600;
  }
  .btn-secondary:hover { background: var(--hover); }
  .btn-danger { color: var(--accent); background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 4px; }
  .btn-danger:hover { text-decoration: underline; }

  /* Confirm / prompt dialogs (replaces window.prompt/confirm, which sandboxed iframes block) */
  .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .confirm-box { background: var(--panel); border-radius: 10px; width: 340px; max-width: 90vw; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,.25); }
  .confirm-box p { margin: 0 0 16px; font-size: 14px; line-height: 1.5; }
  .confirm-box input { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13.5px; margin-bottom: 16px; }
  .confirm-actions { display: flex; justify-content: flex-end; gap: 8px; }

  /* Comments */
  .comments-section { margin-top: 6px; margin-bottom: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
  .comments-section > label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; }
  .comments-list { display: flex; flex-direction: column; gap: 8px; max-height: 160px; overflow-y: auto; margin-bottom: 8px; }
  .comment-item { background: var(--hover); border-radius: 6px; padding: 7px 9px; position: relative; }
  .comment-item .ci-text { font-size: 13px; white-space: pre-wrap; word-break: break-word; padding-right: 18px; }
  .comment-item .ci-time { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
  .comment-item .ci-del {
    position: absolute; top: 6px; right: 6px; background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 12px; padding: 2px 5px; border-radius: 4px;
  }
  .comment-item .ci-del:hover { background: var(--border); color: var(--accent); }
  .comment-add-row { display: flex; gap: 8px; align-items: flex-end; }
  .comment-add-row textarea { flex: 1; min-height: 40px; }
  .comment-hint { font-size: 12px; color: var(--text-dim); }
  .badge.comment { background: var(--hover); color: var(--text-dim); }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sidebar-title">📅 Schedule</div>
    <div class="nav-item" data-filter="today">☀️ 오늘 <span class="count" id="cnt-today"></span></div>
    <div class="nav-item" data-filter="upcoming">📆 예정 <span class="count" id="cnt-upcoming"></span></div>
    <div class="nav-item" data-filter="all">📋 전체 <span class="count" id="cnt-all"></span></div>

    <div class="sidebar-section">
      <span>프로젝트</span>
      <button id="addProjectBtn" title="프로젝트 추가">＋</button>
    </div>
    <div id="projectList"></div>
  </div>

  <div id="main">
    <div id="header">
      <h1 id="viewTitle">오늘</h1>
      <select id="sortSelect">
        <option value="date">마감일순</option>
        <option value="weekday">요일별</option>
        <option value="project">카테고리별</option>
        <option value="meeting">회의별</option>
        <option value="tag">태그별</option>
        <option value="priority">우선순위별</option>
      </select>
      <div class="view-toggle">
        <button data-view="list" class="active">리스트</button>
        <button data-view="week">주간</button>
      </div>
      <button class="btn-primary" id="newTaskBtn">＋ 할 일 추가</button>
    </div>
    <div id="body">
      <div id="content"></div>
      <div id="quarterPanel">
        <div class="qp-header" id="qpTitle">📌 할 일</div>
        <div id="qpList"></div>
        <div class="qp-add-row">
          <input type="text" id="qpInput" placeholder="할 일 추가" autocomplete="off" />
          <button type="button" id="qpAddBtn">＋</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="overlay">
  <div id="modal">
    <h2 id="modalTitle">할 일 추가</h2>
    <form id="taskForm">
      <div class="modal-body-grid">
        <div class="modal-col-left">
          <div class="field">
            <label>제목</label>
            <input type="text" id="f-title" required autocomplete="off" />
          </div>
          <div class="field-row">
            <div class="field">
              <label>날짜</label>
              <input type="date" id="f-date" />
            </div>
            <div class="field">
              <label>시간</label>
              <input type="time" id="f-time" />
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label>프로젝트</label>
              <select id="f-project"></select>
            </div>
            <div class="field">
              <label>우선순위</label>
              <select id="f-priority">
                <option value="low">낮음</option>
                <option value="medium">중간</option>
                <option value="high">높음</option>
              </select>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label>태그 (쉼표로 구분)</label>
              <input type="text" id="f-tags" placeholder="예: 긴급, 보고서" autocomplete="off" />
            </div>
            <div class="field">
              <label>회의</label>
              <input type="text" id="f-meeting" placeholder="예: 7/21 기획 회의" autocomplete="off" />
            </div>
          </div>
        </div>
        <div class="modal-col-right">
          <label>메모</label>
          <textarea id="f-notes" class="notes-textarea"></textarea>
        </div>
      </div>
      <div class="comments-section" id="commentsSection" style="display:none;">
        <label>댓글 / 회의 요약</label>
        <div class="comments-list" id="commentsList"></div>
        <div class="comment-add-row">
          <textarea id="f-comment" placeholder="댓글이나 회의 내용을 간단히 남겨보세요"></textarea>
          <button type="button" class="btn-secondary" id="addCommentBtn">추가</button>
        </div>
      </div>
      <div class="comment-hint" id="commentHint" style="display:none;">할 일을 저장한 뒤 댓글을 추가할 수 있어요.</div>

      <div class="modal-actions">
        <button type="button" class="btn-danger" id="deleteTaskBtn" style="display:none;">삭제</button>
        <div style="flex:1"></div>
        <button type="button" class="btn-secondary" id="cancelBtn">취소</button>
        <button type="submit" class="btn-primary">저장</button>
      </div>
    </form>
  </div>
</div>

<script>
(function () {
  "use strict";
  const STORAGE_KEY = "schedule_app_data_v1";

  function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }
  function dateToStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }
  function quarterKey(d) {
    const dt = d || new Date();
    return `${dt.getFullYear()}-Q${Math.floor(dt.getMonth() / 3) + 1}`;
  }
  function quarterLabel(key) {
    const [y, q] = key.split("-Q");
    return `📌 ${y} ${q}분기 할 일`;
  }

  const PROJECT_COLORS = ["#d1453b","#eb8909","#058527","#4573d1","#a4468c","#767676"];

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (!parsed.quarterTodos) parsed.quarterTodos = {};
        return parsed;
      }
    } catch (e) { console.warn("state load failed", e); }
    return {
      projects: [{ id: "inbox", name: "Inbox", color: "#767676" }],
      tasks: [],
      quarterTodos: {}
    };
  }
  function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  // window.prompt/confirm are blocked inside sandboxed iframes (e.g. published artifacts),
  // so use in-page dialogs instead.
  function showPrompt(title, placeholder) {
    return new Promise((resolve) => {
      const overlay = document.createElement("div");
      overlay.className = "confirm-overlay";
      const box = document.createElement("div");
      box.className = "confirm-box";
      const p = document.createElement("p");
      p.textContent = title;
      const input = document.createElement("input");
      input.type = "text";
      input.placeholder = placeholder || "";
      input.autocomplete = "off";
      const actions = document.createElement("div");
      actions.className = "confirm-actions";
      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button"; cancelBtn.className = "btn-secondary"; cancelBtn.textContent = "취소";
      const okBtn = document.createElement("button");
      okBtn.type = "button"; okBtn.className = "btn-primary"; okBtn.textContent = "추가";
      actions.appendChild(cancelBtn); actions.appendChild(okBtn);
      box.appendChild(p); box.appendChild(input); box.appendChild(actions);
      overlay.appendChild(box);
      document.body.appendChild(overlay);
      input.focus();
      function close(value) { overlay.remove(); resolve(value); }
      cancelBtn.addEventListener("click", () => close(null));
      okBtn.addEventListener("click", () => close(input.value));
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") close(input.value);
        if (e.key === "Escape") close(null);
      });
      overlay.addEventListener("click", (e) => { if (e.target === overlay) close(null); });
    });
  }

  function showConfirm(message, okLabel) {
    return new Promise((resolve) => {
      const overlay = document.createElement("div");
      overlay.className = "confirm-overlay";
      const box = document.createElement("div");
      box.className = "confirm-box";
      const p = document.createElement("p");
      p.textContent = message;
      const actions = document.createElement("div");
      actions.className = "confirm-actions";
      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button"; cancelBtn.className = "btn-secondary"; cancelBtn.textContent = "취소";
      const okBtn = document.createElement("button");
      okBtn.type = "button"; okBtn.className = "btn-primary"; okBtn.textContent = okLabel || "삭제";
      actions.appendChild(cancelBtn); actions.appendChild(okBtn);
      box.appendChild(p); box.appendChild(actions);
      overlay.appendChild(box);
      document.body.appendChild(overlay);
      function close(value) { overlay.remove(); resolve(value); }
      cancelBtn.addEventListener("click", () => close(false));
      okBtn.addEventListener("click", () => close(true));
      overlay.addEventListener("click", (e) => { if (e.target === overlay) close(false); });
    });
  }

  let state = loadState();
  let currentFilter = { type: "today", projectId: null };
  let currentView = "list";
  let sortBy = "date";
  let weekStart = startOfWeek(new Date());
  let editingTaskId = null;

  function startOfWeek(d) {
    const nd = new Date(d);
    const day = nd.getDay(); // 0 Sun .. 6 Sat
    const diff = (day === 0 ? -6 : 1) - day; // Monday as start
    nd.setDate(nd.getDate() + diff);
    nd.setHours(0,0,0,0);
    return nd;
  }

  // ---------- Sidebar ----------
  function renderSidebar() {
    document.querySelectorAll(".nav-item[data-filter]").forEach(el => {
      el.classList.toggle("active", currentFilter.type === el.dataset.filter && !currentFilter.projectId);
    });
    document.getElementById("cnt-today").textContent = countFor("today") || "";
    document.getElementById("cnt-upcoming").textContent = countFor("upcoming") || "";
    document.getElementById("cnt-all").textContent = countFor("all") || "";

    const list = document.getElementById("projectList");
    list.innerHTML = "";
    state.projects.forEach(p => {
      const row = document.createElement("div");
      row.className = "nav-item project-item" + (currentFilter.projectId === p.id ? " active" : "");
      row.innerHTML = `<span class="dot" style="background:${p.color}"></span><span class="pname"></span><span class="count">${countForProject(p.id) || ""}</span>` +
        (p.id !== "inbox" ? `<button class="del-btn" title="삭제">✕</button>` : "");
      row.querySelector(".pname").textContent = p.name;
      row.addEventListener("click", (e) => {
        if (e.target.classList.contains("del-btn")) return;
        currentFilter = { type: "project", projectId: p.id };
        render();
      });
      const delBtn = row.querySelector(".del-btn");
      if (delBtn) {
        delBtn.addEventListener("click", async (e) => {
          e.stopPropagation();
          const ok = await showConfirm(`"${p.name}" 프로젝트를 삭제할까요? 해당 할 일은 Inbox로 이동합니다.`);
          if (!ok) return;
          state.tasks.forEach(t => { if (t.projectId === p.id) t.projectId = "inbox"; });
          state.projects = state.projects.filter(x => x.id !== p.id);
          if (currentFilter.projectId === p.id) currentFilter = { type: "today", projectId: null };
          saveState(); render();
        });
      }
      list.appendChild(row);
    });
  }

  function countFor(type) {
    return state.tasks.filter(t => !t.completed && matchesFilter(t, { type, projectId: null })).length;
  }
  function countForProject(pid) {
    return state.tasks.filter(t => !t.completed && t.projectId === pid).length;
  }

  // ---------- Quarter todo panel ----------
  function renderQuarterPanel() {
    const key = quarterKey();
    if (!state.quarterTodos[key]) state.quarterTodos[key] = [];
    document.getElementById("qpTitle").textContent = quarterLabel(key);

    const list = document.getElementById("qpList");
    list.innerHTML = "";
    state.quarterTodos[key].forEach(item => {
      const row = document.createElement("div");
      row.className = "qp-item" + (item.done ? " done" : "");

      const check = document.createElement("div");
      check.className = "qp-check" + (item.done ? " checked" : "");
      check.addEventListener("click", () => {
        item.done = !item.done;
        saveState(); renderQuarterPanel();
      });

      const text = document.createElement("div");
      text.className = "qp-text";
      text.textContent = item.text;

      const del = document.createElement("button");
      del.className = "qp-del"; del.textContent = "✕";
      del.addEventListener("click", () => {
        state.quarterTodos[key] = state.quarterTodos[key].filter(x => x.id !== item.id);
        saveState(); renderQuarterPanel();
      });

      row.appendChild(check); row.appendChild(text); row.appendChild(del);
      list.appendChild(row);
    });
  }

  function addQuarterTodo() {
    const input = document.getElementById("qpInput");
    const text = input.value.trim();
    if (!text) return;
    const key = quarterKey();
    if (!state.quarterTodos[key]) state.quarterTodos[key] = [];
    state.quarterTodos[key].push({ id: uid(), text, done: false });
    input.value = "";
    saveState(); renderQuarterPanel();
  }

  document.getElementById("qpAddBtn").addEventListener("click", addQuarterTodo);
  document.getElementById("qpInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") addQuarterTodo();
  });

  document.querySelectorAll(".nav-item[data-filter]").forEach(el => {
    el.addEventListener("click", () => {
      currentFilter = { type: el.dataset.filter, projectId: null };
      render();
    });
  });

  document.getElementById("addProjectBtn").addEventListener("click", async () => {
    const name = await showPrompt("새 프로젝트 이름", "예: 업무, 개인");
    if (!name || !name.trim()) return;
    const color = PROJECT_COLORS[state.projects.length % PROJECT_COLORS.length];
    state.projects.push({ id: uid(), name: name.trim(), color });
    saveState(); render();
  });

  // ---------- Filtering ----------
  function matchesFilter(t, filter) {
    if (filter.type === "project") return t.projectId === filter.projectId;
    if (filter.type === "all") return true;
    if (!t.dueDate) return filter.type === "all";
    if (filter.type === "today") return t.dueDate === todayStr();
    if (filter.type === "upcoming") {
      const in7 = new Date(); in7.setDate(in7.getDate() + 7);
      return t.dueDate >= todayStr() && t.dueDate <= dateToStr(in7);
    }
    return true;
  }

  function viewTitleFor() {
    if (currentFilter.type === "project") {
      const p = state.projects.find(x => x.id === currentFilter.projectId);
      return p ? p.name : "프로젝트";
    }
    return { today: "오늘", upcoming: "예정", all: "전체" }[currentFilter.type] || "";
  }

  // ---------- List view ----------
  function renderList() {
    const content = document.getElementById("content");
    content.innerHTML = "";
    let tasks = state.tasks.filter(t => matchesFilter(t, currentFilter));

    const active = tasks.filter(t => !t.completed).sort(sortTasks);
    const done = tasks.filter(t => t.completed).sort((a,b) => (b.completedAt||0) - (a.completedAt||0));

    if (active.length === 0 && done.length === 0) {
      content.innerHTML = `<div class="empty-state">할 일이 없습니다. "＋ 할 일 추가"로 새로 만들어보세요.</div>`;
      return;
    }

    if (active.length) {
      if (sortBy === "date") {
        content.appendChild(taskGroup(null, active));
      } else {
        groupTasksBy(active, sortBy).forEach(g => {
          const title = document.createElement("div");
          title.className = "task-group-title";
          title.textContent = `${g.label} (${g.tasks.length})`;
          content.appendChild(title);
          content.appendChild(taskGroup(null, g.tasks));
        });
      }
    }
    if (done.length) {
      const title = document.createElement("div");
      title.className = "task-group-title";
      title.textContent = `완료됨 (${done.length})`;
      content.appendChild(title);
      content.appendChild(taskGroup(null, done, true));
    }
  }

  const WEEKDAY_NAMES = ["일","월","화","수","목","금","토"];

  function groupTasksBy(tasks, mode) {
    const groups = new Map();
    const order = [];
    function addTo(label, t) {
      if (!groups.has(label)) { groups.set(label, []); order.push(label); }
      groups.get(label).push(t);
    }

    if (mode === "weekday") {
      const weekdayOrder = ["월","화","수","목","금","토","일","날짜 없음"];
      tasks.forEach(t => {
        if (!t.dueDate) { addTo("날짜 없음", t); return; }
        const d = new Date(t.dueDate + "T00:00:00");
        addTo(WEEKDAY_NAMES[d.getDay()], t);
      });
      order.sort((a, b) => weekdayOrder.indexOf(a) - weekdayOrder.indexOf(b));
    } else if (mode === "project") {
      tasks.forEach(t => {
        const p = state.projects.find(x => x.id === t.projectId);
        addTo(p ? p.name : "미분류", t);
      });
      order.sort((a, b) => a.localeCompare(b, "ko"));
    } else if (mode === "meeting") {
      tasks.forEach(t => addTo(t.meeting && t.meeting.trim() ? t.meeting.trim() : "회의 없음", t));
      order.sort((a, b) => (a === "회의 없음") - (b === "회의 없음") || a.localeCompare(b, "ko"));
    } else if (mode === "tag") {
      tasks.forEach(t => {
        if (t.tags && t.tags.length) {
          t.tags.forEach(tag => addTo(tag, t));
        } else {
          addTo("태그 없음", t);
        }
      });
      order.sort((a, b) => (a === "태그 없음") - (b === "태그 없음") || a.localeCompare(b, "ko"));
    } else if (mode === "priority") {
      const labels = { high: "높음", medium: "중간", low: "낮음" };
      tasks.forEach(t => addTo(labels[t.priority], t));
      order.sort((a, b) => ["높음", "중간", "낮음"].indexOf(a) - ["높음", "중간", "낮음"].indexOf(b));
    }

    order.forEach(label => groups.get(label).sort(sortTasks));
    return order.map(label => ({ label, tasks: groups.get(label) }));
  }

  function sortTasks(a, b) {
    const pr = { high: 0, medium: 1, low: 2 };
    const ad = a.dueDate || "9999-99-99";
    const bd = b.dueDate || "9999-99-99";
    if (ad !== bd) return ad < bd ? -1 : 1;
    return pr[a.priority] - pr[b.priority];
  }

  function taskGroup(title, tasks) {
    const wrap = document.createElement("div");
    tasks.forEach(t => wrap.appendChild(taskRow(t)));
    return wrap;
  }

  function taskRow(t) {
    const row = document.createElement("div");
    row.className = "task-row" + (t.completed ? " completed" : "");
    const proj = state.projects.find(p => p.id === t.projectId);

    const cb = document.createElement("div");
    cb.className = "checkbox " + t.priority + (t.completed ? " checked" : "");
    cb.addEventListener("click", (e) => {
      e.stopPropagation();
      t.completed = !t.completed;
      t.completedAt = t.completed ? Date.now() : null;
      saveState(); render();
    });

    const body = document.createElement("div");
    body.className = "task-body";
    const titleEl = document.createElement("div");
    titleEl.className = "task-title";
    titleEl.textContent = t.title;
    body.appendChild(titleEl);

    if (t.notes) {
      const notesEl = document.createElement("div");
      notesEl.className = "task-notes";
      notesEl.textContent = t.notes;
      body.appendChild(notesEl);
    }

    const meta = document.createElement("div");
    meta.className = "task-meta";
    if (t.dueDate) {
      const badge = document.createElement("span");
      const isOverdue = t.dueDate < todayStr() && !t.completed;
      const isToday = t.dueDate === todayStr();
      badge.className = "badge due" + (isOverdue ? " overdue" : isToday ? " today" : "");
      badge.textContent = formatDate(t.dueDate) + (t.dueTime ? ` ${t.dueTime}` : "");
      meta.appendChild(badge);
    }
    if (proj) {
      const badge = document.createElement("span");
      badge.className = "badge project";
      badge.innerHTML = `<span class="pdot" style="background:${proj.color}"></span>`;
      badge.appendChild(document.createTextNode(proj.name));
      meta.appendChild(badge);
    }
    if (t.meeting) {
      const badge = document.createElement("span");
      badge.className = "badge meeting";
      badge.textContent = `📌 ${t.meeting}`;
      meta.appendChild(badge);
    }
    (t.tags || []).forEach(tag => {
      const badge = document.createElement("span");
      badge.className = "badge tag";
      badge.textContent = `#${tag}`;
      meta.appendChild(badge);
    });
    if (t.comments && t.comments.length) {
      const badge = document.createElement("span");
      badge.className = "badge comment";
      badge.textContent = `💬 ${t.comments.length}`;
      meta.appendChild(badge);
    }
    body.appendChild(meta);

    const actions = document.createElement("div");
    actions.className = "task-actions";
    const editBtn = document.createElement("button");
    editBtn.className = "icon-btn"; editBtn.textContent = "✎";
    editBtn.addEventListener("click", (e) => { e.stopPropagation(); openTaskModal(t.id); });
    const delBtn = document.createElement("button");
    delBtn.className = "icon-btn"; delBtn.textContent = "✕";
    delBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      state.tasks = state.tasks.filter(x => x.id !== t.id);
      saveState(); render();
    });
    actions.appendChild(editBtn); actions.appendChild(delBtn);

    row.appendChild(cb); row.appendChild(body); row.appendChild(actions);
    row.addEventListener("click", () => openTaskModal(t.id));
    return row;
  }

  function formatDate(str) {
    const d = new Date(str + "T00:00:00");
    const today = todayStr();
    if (str === today) return "오늘";
    const tmr = new Date(); tmr.setDate(tmr.getDate()+1);
    if (str === dateToStr(tmr)) return "내일";
    return `${d.getMonth()+1}/${d.getDate()}`;
  }

  // ---------- Week view ----------
  function renderWeek() {
    const content = document.getElementById("content");
    content.innerHTML = "";

    const nav = document.createElement("div");
    nav.id = "weekNav";
    const prevBtn = document.createElement("button"); prevBtn.textContent = "◀";
    const todayBtn = document.createElement("button"); todayBtn.textContent = "이번 주";
    const nextBtn = document.createElement("button"); nextBtn.textContent = "▶";
    const label = document.createElement("span"); label.id = "weekLabel";
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate() + 6);
    label.textContent = `${weekStart.getFullYear()}. ${weekStart.getMonth()+1}.${weekStart.getDate()} - ${weekEnd.getMonth()+1}.${weekEnd.getDate()}`;
    prevBtn.addEventListener("click", () => { weekStart.setDate(weekStart.getDate() - 7); render(); });
    nextBtn.addEventListener("click", () => { weekStart.setDate(weekStart.getDate() + 7); render(); });
    todayBtn.addEventListener("click", () => { weekStart = startOfWeek(new Date()); render(); });
    nav.appendChild(prevBtn); nav.appendChild(todayBtn); nav.appendChild(nextBtn); nav.appendChild(label);
    content.appendChild(nav);

    const grid = document.createElement("div");
    grid.className = "week-grid";
    const dayNames = ["월","화","수","목","금","토","일"];
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekStart); d.setDate(d.getDate() + i);
      const dstr = dateToStr(d);
      const col = document.createElement("div");
      col.className = "day-col" + (dstr === todayStr() ? " is-today" : "");
      const header = document.createElement("div");
      header.className = "day-col-header";
      header.innerHTML = `<div class="dname">${dayNames[i]}</div><div class="dnum">${d.getDate()}</div>`;
      col.appendChild(header);

      const dayTasks = document.createElement("div");
      dayTasks.className = "day-tasks";
      const tasksForDay = state.tasks.filter(t => t.dueDate === dstr).sort(sortTasks);
      tasksForDay.forEach(t => {
        const card = document.createElement("div");
        card.className = "day-task " + t.priority + (t.completed ? " completed" : "");
        card.innerHTML = `<div>${escapeHtml(t.title)}</div>` +
          (t.dueTime ? `<div class="dt-time">${t.dueTime}</div>` : "") +
          (t.meeting ? `<div class="dt-meeting">📌 ${escapeHtml(t.meeting)}</div>` : "");
        card.addEventListener("click", () => openTaskModal(t.id));
        dayTasks.appendChild(card);
      });
      col.appendChild(dayTasks);
      grid.appendChild(col);
    }
    content.appendChild(grid);
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  // ---------- View toggle ----------
  document.querySelectorAll(".view-toggle button").forEach(btn => {
    btn.addEventListener("click", () => {
      currentView = btn.dataset.view;
      document.querySelectorAll(".view-toggle button").forEach(b => b.classList.toggle("active", b === btn));
      render();
    });
  });

  document.getElementById("sortSelect").addEventListener("change", (e) => {
    sortBy = e.target.value;
    render();
  });

  // ---------- Modal ----------
  const overlay = document.getElementById("overlay");
  const form = document.getElementById("taskForm");
  const deleteBtn = document.getElementById("deleteTaskBtn");

  function populateProjectSelect() {
    const sel = document.getElementById("f-project");
    sel.innerHTML = "";
    state.projects.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p.id; opt.textContent = p.name;
      sel.appendChild(opt);
    });
  }

  function openTaskModal(taskId) {
    editingTaskId = taskId || null;
    populateProjectSelect();
    document.getElementById("modalTitle").textContent = taskId ? "할 일 수정" : "할 일 추가";
    deleteBtn.style.display = taskId ? "inline-block" : "none";

    if (taskId) {
      const t = state.tasks.find(x => x.id === taskId);
      if (!t.comments) t.comments = [];
      document.getElementById("f-title").value = t.title;
      document.getElementById("f-notes").value = t.notes || "";
      document.getElementById("f-date").value = t.dueDate || "";
      document.getElementById("f-time").value = t.dueTime || "";
      document.getElementById("f-project").value = t.projectId;
      document.getElementById("f-priority").value = t.priority;
      document.getElementById("f-tags").value = (t.tags || []).join(", ");
      document.getElementById("f-meeting").value = t.meeting || "";
      document.getElementById("commentsSection").style.display = "block";
      document.getElementById("commentHint").style.display = "none";
      document.getElementById("f-comment").value = "";
      renderComments();
    } else {
      form.reset();
      document.getElementById("f-date").value = currentFilter.type === "today" ? todayStr() : "";
      document.getElementById("f-project").value = currentFilter.projectId || "inbox";
      document.getElementById("f-priority").value = "low";
      document.getElementById("commentsSection").style.display = "none";
      document.getElementById("commentHint").style.display = "block";
    }
    overlay.classList.add("show");
    document.getElementById("f-title").focus();
  }

  function renderComments() {
    const list = document.getElementById("commentsList");
    list.innerHTML = "";
    const t = state.tasks.find(x => x.id === editingTaskId);
    if (!t) return;
    const comments = (t.comments || []).slice().sort((a, b) => b.createdAt - a.createdAt);
    comments.forEach(c => {
      const item = document.createElement("div");
      item.className = "comment-item";
      const textEl = document.createElement("div");
      textEl.className = "ci-text";
      textEl.textContent = c.text;
      const timeEl = document.createElement("div");
      timeEl.className = "ci-time";
      timeEl.textContent = new Date(c.createdAt).toLocaleString("ko-KR", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
      const delBtn = document.createElement("button");
      delBtn.className = "ci-del"; delBtn.textContent = "✕";
      delBtn.addEventListener("click", () => {
        t.comments = t.comments.filter(x => x.id !== c.id);
        saveState();
        renderComments();
      });
      item.appendChild(delBtn);
      item.appendChild(textEl);
      item.appendChild(timeEl);
      list.appendChild(item);
    });
  }

  document.getElementById("addCommentBtn").addEventListener("click", () => {
    if (!editingTaskId) return;
    const textarea = document.getElementById("f-comment");
    const text = textarea.value.trim();
    if (!text) return;
    const t = state.tasks.find(x => x.id === editingTaskId);
    if (!t.comments) t.comments = [];
    t.comments.push({ id: uid(), text, createdAt: Date.now() });
    saveState();
    textarea.value = "";
    renderComments();
  });

  function closeModal() {
    overlay.classList.remove("show");
    editingTaskId = null;
  }

  document.getElementById("newTaskBtn").addEventListener("click", () => openTaskModal(null));
  document.getElementById("cancelBtn").addEventListener("click", closeModal);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const data = {
      title: document.getElementById("f-title").value.trim(),
      notes: document.getElementById("f-notes").value.trim(),
      dueDate: document.getElementById("f-date").value || null,
      dueTime: document.getElementById("f-time").value || null,
      projectId: document.getElementById("f-project").value,
      priority: document.getElementById("f-priority").value,
      tags: document.getElementById("f-tags").value.split(",").map(s => s.trim()).filter(Boolean),
      meeting: document.getElementById("f-meeting").value.trim() || null,
    };
    if (!data.title) return;

    if (editingTaskId) {
      Object.assign(state.tasks.find(x => x.id === editingTaskId), data);
    } else {
      state.tasks.push({
        id: uid(), completed: false, completedAt: null, createdAt: Date.now(), comments: [], ...data
      });
    }
    saveState();
    closeModal();
    render();
  });

  deleteBtn.addEventListener("click", async () => {
    if (!editingTaskId) return;
    const ok = await showConfirm("이 할 일을 삭제할까요?");
    if (ok) {
      state.tasks = state.tasks.filter(x => x.id !== editingTaskId);
      saveState();
      closeModal();
      render();
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && overlay.classList.contains("show")) closeModal();
  });

  // ---------- Render dispatch ----------
  function render() {
    document.getElementById("viewTitle").textContent = viewTitleFor();
    renderSidebar();
    renderQuarterPanel();
    document.getElementById("sortSelect").style.display = currentView === "list" ? "inline-block" : "none";
    if (currentView === "list") renderList();
    else renderWeek();
  }

  render();
})();
</script>
</body>
</html>
